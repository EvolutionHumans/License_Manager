<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator Pro — 用户管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ── 全局变量 ─────────────────────────────────── */
  :root {
    --bg:        #0A0A0F;
    --surface:   #13131A;
    --surface2:  #1C1C26;
    --border:    #2A2A3A;
    --accent:    #7C6AF7;
    --accent2:   #4FFFB0;
    --danger:    #FF4757;
    --warning:   #FFAA00;
    --text:      #E8E8F0;
    --muted:     #5A5A72;
    --admin-tag: #7C6AF7;
    --user-tag:  #4FFFB0;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-head);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── 网格背景装饰 ──────────────────────────────── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,106,247,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,106,247,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── 登录页 ────────────────────────────────────── */
  #login-page {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    background: var(--bg);
  }

  .login-box {
    width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    position: relative;
    overflow: hidden;
  }

  .login-box::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(124,106,247,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .login-logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .login-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .login-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
    font-family: var(--font-mono);
  }

  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 16px;
  }

  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--muted); }

  .field-hint {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--font-mono);
    margin-top: -10px;
    margin-bottom: 16px;
    line-height: 1.5;
  }

  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-primary:hover { opacity: 0.85; }
  .btn-primary:active { transform: scale(0.98); }

  .login-error {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    font-family: var(--font-mono);
    margin-top: 12px;
    display: none;
  }

  /* ── 主界面 ────────────────────────────────────── */
  #main-page { display: none; position: relative; z-index: 1; }

  /* ── 顶部导航 ──────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,10,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .topbar-left { display: flex; align-items: center; gap: 16px; }

  .logo-mark {
    width: 32px; height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800;
    color: white;
  }

  .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo-badge {
    font-size: 10px;
    font-family: var(--font-mono);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 20px;
    color: var(--muted);
  }

  .topbar-right { display: flex; align-items: center; gap: 12px; }

  .repo-info {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }

  .repo-info span { color: var(--accent2); }

  .btn-sm {
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid;
    transition: all 0.2s;
    font-family: var(--font-head);
  }

  .btn-outline {
    background: transparent;
    border-color: var(--border);
    color: var(--muted);
  }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  .btn-success {
    background: rgba(79,255,176,0.1);
    border-color: rgba(79,255,176,0.3);
    color: var(--accent2);
  }
  .btn-success:hover { background: rgba(79,255,176,0.2); }

  .btn-danger-sm {
    background: rgba(255,71,87,0.1);
    border-color: rgba(255,71,87,0.3);
    color: var(--danger);
  }
  .btn-danger-sm:hover { background: rgba(255,71,87,0.2); }

  /* ── 主内容区 ──────────────────────────────────── */
  .container { max-width: 1200px; margin: 0 auto; padding: 32px; }

  /* ── 统计卡片 ──────────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card:hover { border-color: var(--accent); }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    opacity: 0.6;
  }

  .stat-card.s1::after { background: var(--accent); }
  .stat-card.s2::after { background: var(--accent2); }
  .stat-card.s3::after { background: var(--warning); }
  .stat-card.s4::after { background: var(--danger); }

  .stat-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-card.s1 .stat-value { color: var(--accent); }
  .stat-card.s2 .stat-value { color: var(--accent2); }
  .stat-card.s3 .stat-value { color: var(--warning); }
  .stat-card.s4 .stat-value { color: var(--danger); }

  .stat-sub { font-size: 12px; color: var(--muted); font-family: var(--font-mono); }

  /* ── 操作栏 ──────────────────────────────────── */
  .action-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
    gap: 12px;
  }

  .action-bar-left { display: flex; gap: 10px; align-items: center; }

  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 14px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    width: 240px;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .filter-btn {
    padding: 9px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-head);
  }
  .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(124,106,247,0.1); }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-add {
    padding: 9px 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    font-family: var(--font-head);
    white-space: nowrap;
  }
  .btn-add:hover { opacity: 0.85; }

  /* ── 用户表格 ──────────────────────────────────── */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }

  thead tr {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  tbody tr {
    border-bottom: 1px solid rgba(42,42,58,0.5);
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(124,106,247,0.04); }

  td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }

  .user-avatar {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    margin-right: 10px;
    flex-shrink: 0;
  }

  .user-cell { display: flex; align-items: center; }
  .user-name { font-weight: 600; color: var(--text); }
  .user-id { font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  .tag {
    display: inline-flex; align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-mono);
    letter-spacing: 0.5px;
  }

  .tag-admin { background: rgba(124,106,247,0.15); color: var(--admin-tag); border: 1px solid rgba(124,106,247,0.25); }
  .tag-user  { background: rgba(79,255,176,0.1);  color: var(--user-tag);  border: 1px solid rgba(79,255,176,0.2); }
  .tag-on    { background: rgba(79,255,176,0.1);  color: var(--accent2);   border: 1px solid rgba(79,255,176,0.2); }
  .tag-off   { background: rgba(255,71,87,0.1);   color: var(--danger);    border: 1px solid rgba(255,71,87,0.2); }
  .tag-exp   { background: rgba(255,170,0,0.1);   color: var(--warning);   border: 1px solid rgba(255,170,0,0.2); }

  .license-code {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .date-text { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }

  .actions-cell { display: flex; gap: 6px; }

  /* ── 模态框 ──────────────────────────────────── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px;
    width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(10px);
    transition: transform 0.2s;
    position: relative;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 4px;
  }
  .modal-sub {
    font-size: 13px; color: var(--muted);
    font-family: var(--font-mono);
    margin-bottom: 24px;
  }

  .modal-close {
    position: absolute; top: 16px; right: 16px;
    width: 28px; height: 28px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { color: var(--danger); border-color: var(--danger); }

  .form-row { margin-bottom: 16px; }

  .form-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; display: block;
  }

  .form-input, .form-select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select { cursor: pointer; }
  .form-select option { background: var(--surface2); }

  .generated-pwd {
    display: flex; gap: 8px; align-items: center;
  }
  .generated-pwd .form-input { flex: 1; }

  .btn-gen {
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--accent2);
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    font-family: var(--font-head);
    font-weight: 600;
  }
  .btn-gen:hover { border-color: var(--accent2); }

  .modal-footer {
    display: flex; gap: 10px; justify-content: flex-end;
    margin-top: 24px; padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .btn-cancel {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: var(--font-head);
    font-weight: 600;
  }
  .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

  /* ── 吐司通知 ──────────────────────────────────── */
  .toast-wrap {
    position: fixed; bottom: 24px; right: 24px;
    z-index: 999; display: flex; flex-direction: column; gap: 8px;
  }

  .toast {
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-family: var(--font-mono);
    display: flex; align-items: center; gap: 8px;
    animation: slideIn 0.3s ease;
    max-width: 320px;
  }

  .toast-ok  { background: rgba(79,255,176,0.15); border: 1px solid rgba(79,255,176,0.3); color: var(--accent2); }
  .toast-err { background: rgba(255,71,87,0.15);  border: 1px solid rgba(255,71,87,0.3);  color: var(--danger); }
  .toast-info{ background: rgba(124,106,247,0.15);border: 1px solid rgba(124,106,247,0.3);color: var(--accent); }

  @keyframes slideIn {
    from { transform: translateX(30px); opacity: 0; }
    to   { transform: translateX(0);    opacity: 1; }
  }

  /* ── 空状态 ──────────────────────────────────── */
  .empty-state {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-family: var(--font-mono);
  }
  .empty-state .emoji { font-size: 40px; margin-bottom: 12px; }

  /* ── 保存提示横幅 ─────────────────────────────── */
  .save-banner {
    background: rgba(255,170,0,0.08);
    border: 1px solid rgba(255,170,0,0.2);
    border-radius: 10px;
    padding: 12px 20px;
    margin-bottom: 24px;
    display: none;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    color: var(--warning);
    font-family: var(--font-mono);
  }
  .save-banner.show { display: flex; }

  /* ── 响应式 ──────────────────────────────────── */
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2,1fr); }
    .container  { padding: 16px; }
    .topbar     { padding: 0 16px; }
  }
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════
     登录页
════════════════════════════════════════════════ -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">Calculator Pro</div>
    <div class="login-title">管理员后台</div>
    <div class="login-sub">// 使用 GitHub PAT 连接仓库</div>

    <label class="field-label">GitHub 用户名</label>
    <input class="field-input" id="gh-owner" placeholder="your-username" autocomplete="off">

    <label class="field-label">仓库名称</label>
    <input class="field-input" id="gh-repo" placeholder="calcpro-users" autocomplete="off">

    <label class="field-label">Personal Access Token</label>
    <input class="field-input" id="gh-token" type="password"
           placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
    <div class="field-hint">
      需要 repo 权限。<br>
      GitHub → Settings → Developer settings → Personal access tokens → Fine-grained tokens
    </div>

    <button class="btn-primary" onclick="doLogin()">连接仓库</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════════
     主界面
════════════════════════════════════════════════ -->
<div id="main-page">

  <!-- 顶部导航 -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">C</div>
      <div class="logo-text">Calculator Pro</div>
      <div class="logo-badge">Admin Console</div>
    </div>
    <div class="topbar-right">
      <div class="repo-info">
        <span id="repo-display">owner/repo</span>
      </div>
      <button class="btn-sm btn-outline" onclick="fetchUsers()">↻ 刷新</button>
      <button class="btn-sm btn-outline" onclick="logout()">退出</button>
    </div>
  </div>

  <div class="container">

    <!-- 未保存提示横幅 -->
    <div class="save-banner" id="save-banner">
      ⚠ 有未保存的更改
      <button class="btn-sm btn-success" onclick="saveToGitHub()">保存到 GitHub</button>
    </div>

    <!-- 统计卡片 -->
    <div class="stats-grid">
      <div class="stat-card s1">
        <div class="stat-label">总用户数</div>
        <div class="stat-value" id="st-total">0</div>
        <div class="stat-sub">已注册账号</div>
      </div>
      <div class="stat-card s2">
        <div class="stat-label">有效用户</div>
        <div class="stat-value" id="st-active">0</div>
        <div class="stat-sub">状态正常</div>
      </div>
      <div class="stat-card s3">
        <div class="stat-label">管理员</div>
        <div class="stat-value" id="st-admin">0</div>
        <div class="stat-sub">高权限账号</div>
      </div>
      <div class="stat-card s4">
        <div class="stat-label">已禁用/过期</div>
        <div class="stat-value" id="st-disabled">0</div>
        <div class="stat-sub">不可用账号</div>
      </div>
    </div>

    <!-- 操作栏 -->
    <div class="action-bar">
      <div class="action-bar-left">
        <input class="search-input" id="search-input"
               placeholder="搜索用户名 / ID..."
               oninput="renderTable()">
        <button class="filter-btn active" id="f-all"   onclick="setFilter('all')">全部</button>
        <button class="filter-btn"        id="f-admin" onclick="setFilter('admin')">管理员</button>
        <button class="filter-btn"        id="f-user"  onclick="setFilter('user')">普通用户</button>
        <button class="filter-btn"        id="f-off"   onclick="setFilter('disabled')">已禁用</button>
      </div>
      <button class="btn-add" onclick="openAddModal()">+ 新建用户</button>
    </div>

    <!-- 用户表格 -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>用户</th>
            <th>角色</th>
            <th>状态</th>
            <th>许可证密钥</th>
            <th>到期日期</th>
            <th>创建时间</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="user-tbody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════════
     新建/编辑用户模态框
════════════════════════════════════════════════ -->
<div class="modal-overlay" id="user-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modal-title">新建用户</div>
    <div class="modal-sub" id="modal-sub">// 填写账号信息</div>

    <div class="form-row">
      <label class="form-label">用户名</label>
      <input class="form-input" id="f-username" placeholder="user001">
    </div>

    <div class="form-row">
      <label class="form-label">显示名称</label>
      <input class="form-input" id="f-displayname" placeholder="张三">
    </div>

    <div class="form-row">
      <label class="form-label">密码（明文，保存时自动加密）</label>
      <div class="generated-pwd">
        <input class="form-input" id="f-password" placeholder="设置密码">
        <button class="btn-gen" onclick="genPassword()">🎲 随机生成</button>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">角色</label>
      <select class="form-select" id="f-role">
        <option value="user">普通用户 (user)</option>
        <option value="admin">管理员 (admin)</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">许可证密钥（可留空）</label>
      <div class="generated-pwd">
        <input class="form-input" id="f-license" placeholder="XXXXX-XXXXX-XXXXX-XXXXX">
        <button class="btn-gen" onclick="genLicenseKey()">🔑 生成</button>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">到期日期</label>
      <input class="form-input" id="f-expires" type="date">
    </div>

    <div class="form-row">
      <label class="form-label">状态</label>
      <select class="form-select" id="f-enabled">
        <option value="true">启用</option>
        <option value="false">禁用</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">备注</label>
      <input class="form-input" id="f-note" placeholder="可选备注信息">
    </div>

    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-primary" id="modal-save-btn" onclick="saveUser()">创建用户</button>
    </div>
  </div>
</div>

<!-- 吐司容器 -->
<div class="toast-wrap" id="toast-wrap"></div>

<!-- ══════════════════════════════════════════════
     JavaScript
════════════════════════════════════════════════ -->
<script>
// ── 全局状态 ───────────────────────────────────────
let GH = { owner: '', repo: '', token: '' };
let DB = { _meta: {}, users: [] };
let fileSHA  = '';       // GitHub文件SHA（更新时需要）
let currentFilter = 'all';
let editingId = null;    // null=新建, 有值=编辑
let unsaved  = false;

// ── 工具函数 ──────────────────────────────────────
const sha256 = async (msg) => {
  const buf = await crypto.subtle.digest('SHA-256',
    new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0')).join('');
};

const uid = () => crypto.randomUUID().split('-')[0];

const today = () => new Date().toISOString().slice(0,10);

const oneYear = () => {
  const d = new Date();
  d.setFullYear(d.getFullYear() + 1);
  return d.toISOString().slice(0,10);
};

const isExpired = (dateStr) => dateStr && new Date(dateStr) < new Date();

const avatarColor = (name) => {
  const colors = ['#7C6AF7','#4FFFB0','#FF9F0A','#FF4757','#00D2FF','#FF6B9D'];
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % colors.length;
  return colors[h];
};

// ── 登录 / 连接 GitHub ───────────────────────────
async function doLogin() {
  const owner = document.getElementById('gh-owner').value.trim();
  const repo  = document.getElementById('gh-repo').value.trim();
  const token = document.getElementById('gh-token').value.trim();
  const errEl = document.getElementById('login-error');

  if (!owner || !repo || !token) {
    errEl.style.display = 'block';
    errEl.textContent = '请填写所有字段';
    return;
  }

  errEl.style.display = 'none';
  const btn = document.querySelector('#login-page .btn-primary');
  btn.textContent = '连接中...';
  btn.disabled = true;

  GH = { owner, repo, token };

  const ok = await fetchUsers();
  if (ok) {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('main-page').style.display  = 'block';
    document.getElementById('repo-display').innerHTML =
      `<span>${owner}/${repo}</span>`;
    // 记住登录（sessionStorage）
    sessionStorage.setItem('gh_owner', owner);
    sessionStorage.setItem('gh_repo',  repo);
    sessionStorage.setItem('gh_token', token);
  } else {
    errEl.style.display = 'block';
    errEl.textContent   = '连接失败：请检查用户名、仓库名和 Token 权限';
    btn.textContent = '连接仓库';
    btn.disabled = false;
  }
}

function logout() {
  sessionStorage.clear();
  location.reload();
}

// ── 从 GitHub 获取 users.json ────────────────────
async function fetchUsers() {
  try {
    const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/users.json`;
    const r = await fetch(url, {
      headers: {
        'Authorization': `Bearer ${GH.token}`,
        'Accept': 'application/vnd.github.v3+json'
      }
    });

    if (!r.ok) {
      if (r.status === 404) {
        // 文件不存在，创建初始文件
        await initUsersFile();
        return true;
      }
      return false;
    }

    const data = await r.json();
    fileSHA = data.sha;
    const content = atob(data.content.replace(/\n/g,''));
    DB = JSON.parse(content);
    if (!DB.users) DB.users = [];
    updateStats();
    renderTable();
    return true;
  } catch(e) {
    console.error(e);
    return false;
  }
}

async function initUsersFile() {
  DB = {
    _meta: { app: 'CalculatorPro', version: '1.0', last_updated: new Date().toISOString() },
    users: [{
      id: 'admin-001',
      username: 'admin',
      password_hash: await sha256('admin123'),
      role: 'admin',
      display_name: '管理员',
      license_key: '',
      created_at: today(),
      expires_at: '2099-12-31',
      enabled: true,
      last_login: null,
      note: '默认管理员账号，请及时修改密码'
    }]
  };
  await pushToGitHub('初始化用户数据库');
}

// ── 保存到 GitHub ─────────────────────────────────
async function saveToGitHub() {
  DB._meta.last_updated = new Date().toISOString();
  await pushToGitHub(`更新用户数据 ${new Date().toLocaleString('zh-CN')}`);
}

async function pushToGitHub(commitMsg) {
  try {
    const url = `https://api.github.com/repos/${GH.owner}/${GH.repo}/contents/users.json`;
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(DB, null, 2))));

    const body = { message: commitMsg, content };
    if (fileSHA) body.sha = fileSHA;

    const r = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${GH.token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (r.ok) {
      const data = await r.json();
      fileSHA = data.content.sha;
      unsaved = false;
      document.getElementById('save-banner').classList.remove('show');
      toast('已保存到 GitHub ✓', 'ok');
    } else {
      const err = await r.json();
      toast(`保存失败: ${err.message}`, 'err');
    }
  } catch(e) {
    toast(`网络错误: ${e.message}`, 'err');
  }
}

// ── 统计更新 ──────────────────────────────────────
function updateStats() {
  const users    = DB.users;
  const active   = users.filter(u => u.enabled && !isExpired(u.expires_at));
  const admins   = users.filter(u => u.role === 'admin');
  const disabled = users.filter(u => !u.enabled || isExpired(u.expires_at));

  document.getElementById('st-total').textContent    = users.length;
  document.getElementById('st-active').textContent   = active.length;
  document.getElementById('st-admin').textContent    = admins.length;
  document.getElementById('st-disabled').textContent = disabled.length;
}

// ── 渲染表格 ──────────────────────────────────────
function renderTable() {
  const search = document.getElementById('search-input').value.toLowerCase();
  let users = DB.users.filter(u => {
    const matchSearch =
      u.username.toLowerCase().includes(search) ||
      u.id.toLowerCase().includes(search) ||
      (u.display_name||'').toLowerCase().includes(search);
    const matchFilter =
      currentFilter === 'all'      ? true :
      currentFilter === 'admin'    ? u.role === 'admin' :
      currentFilter === 'user'     ? u.role === 'user' :
      currentFilter === 'disabled' ? (!u.enabled || isExpired(u.expires_at)) :
      true;
    return matchSearch && matchFilter;
  });

  const tbody = document.getElementById('user-tbody');

  if (users.length === 0) {
    tbody.innerHTML = `
      <tr><td colspan="7">
        <div class="empty-state">
          <div class="emoji">👤</div>
          <div>没有找到匹配的用户</div>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = users.map(u => {
    const expired  = isExpired(u.expires_at);
    const statusTag = !u.enabled
      ? `<span class="tag tag-off">禁用</span>`
      : expired
      ? `<span class="tag tag-exp">已过期</span>`
      : `<span class="tag tag-on">启用</span>`;

    const roleTag = u.role === 'admin'
      ? `<span class="tag tag-admin">admin</span>`
      : `<span class="tag tag-user">user</span>`;

    const color = avatarColor(u.username);
    const initials = (u.display_name || u.username).slice(0,1).toUpperCase();

    return `
    <tr>
      <td>
        <div class="user-cell">
          <div class="user-avatar" style="background:${color}20;color:${color}">${initials}</div>
          <div>
            <div class="user-name">${escHtml(u.display_name || u.username)}</div>
            <div class="user-id">@${escHtml(u.username)} · ${u.id}</div>
          </div>
        </div>
      </td>
      <td>${roleTag}</td>
      <td>${statusTag}</td>
      <td><span class="license-code">${u.license_key || '—'}</span></td>
      <td><span class="date-text">${u.expires_at || '永久'}</span></td>
      <td><span class="date-text">${u.created_at || '—'}</span></td>
      <td>
        <div class="actions-cell">
          <button class="btn-sm btn-outline" onclick="openEditModal('${u.id}')">编辑</button>
          <button class="btn-sm ${u.enabled ? 'btn-danger-sm' : 'btn-success'}"
                  onclick="toggleUser('${u.id}')">
            ${u.enabled ? '禁用' : '启用'}
          </button>
          <button class="btn-sm btn-danger-sm" onclick="deleteUser('${u.id}')">删除</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── 过滤器 ──────────────────────────────────────
function setFilter(f) {
  currentFilter = f;
  ['all','admin','user','disabled'].forEach(id => {
    document.getElementById('f-'+id).classList.toggle('active', id === f);
  });
  renderTable();
}

// ── 新建用户模态框 ────────────────────────────────
function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '新建用户';
  document.getElementById('modal-sub').textContent   = '// 填写新账号信息';
  document.getElementById('modal-save-btn').textContent = '创建用户';

  // 重置表单
  document.getElementById('f-username').value    = '';
  document.getElementById('f-displayname').value = '';
  document.getElementById('f-password').value    = '';
  document.getElementById('f-role').value        = 'user';
  document.getElementById('f-license').value     = '';
  document.getElementById('f-expires').value     = oneYear();
  document.getElementById('f-enabled').value     = 'true';
  document.getElementById('f-note').value        = '';

  document.getElementById('user-modal').classList.add('open');
}

function openEditModal(id) {
  const u = DB.users.find(x => x.id === id);
  if (!u) return;
  editingId = id;

  document.getElementById('modal-title').textContent = '编辑用户';
  document.getElementById('modal-sub').textContent   = `// ${u.username}`;
  document.getElementById('modal-save-btn').textContent = '保存更改';

  document.getElementById('f-username').value    = u.username;
  document.getElementById('f-displayname').value = u.display_name || '';
  document.getElementById('f-password').value    = '';  // 不回填密码
  document.getElementById('f-role').value        = u.role;
  document.getElementById('f-license').value     = u.license_key || '';
  document.getElementById('f-expires').value     = u.expires_at || '';
  document.getElementById('f-enabled').value     = u.enabled ? 'true' : 'false';
  document.getElementById('f-note').value        = u.note || '';

  document.getElementById('user-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('user-modal').classList.remove('open');
  editingId = null;
}

// 随机密码
function genPassword() {
  const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789!@#$';
  let pwd = '';
  for (let i=0; i<12; i++)
    pwd += chars[Math.floor(Math.random()*chars.length)];
  document.getElementById('f-password').value = pwd;
}

// 随机许可证密钥
function genLicenseKey() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const seg = () => Array.from({length:5}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
  document.getElementById('f-license').value = `${seg()}-${seg()}-${seg()}-${seg()}`;
}

// 保存用户（新建 or 编辑）
async function saveUser() {
  const username    = document.getElementById('f-username').value.trim();
  const displayname = document.getElementById('f-displayname').value.trim();
  const password    = document.getElementById('f-password').value;
  const role        = document.getElementById('f-role').value;
  const license     = document.getElementById('f-license').value.trim();
  const expires     = document.getElementById('f-expires').value;
  const enabled     = document.getElementById('f-enabled').value === 'true';
  const note        = document.getElementById('f-note').value.trim();

  if (!username) { toast('用户名不能为空', 'err'); return; }

  // 检查用户名重复
  const dup = DB.users.find(u => u.username === username && u.id !== editingId);
  if (dup) { toast('用户名已存在', 'err'); return; }

  if (editingId) {
    // 编辑模式
    const u = DB.users.find(x => x.id === editingId);
    if (!u) return;
    u.username     = username;
    u.display_name = displayname;
    u.role         = role;
    u.license_key  = license;
    u.expires_at   = expires;
    u.enabled      = enabled;
    u.note         = note;
    if (password) u.password_hash = await sha256(password);
    toast('用户已更新，记得保存到 GitHub', 'info');
  } else {
    // 新建模式
    if (!password) { toast('密码不能为空', 'err'); return; }
    const newUser = {
      id:            uid(),
      username,
      password_hash: await sha256(password),
      role,
      display_name:  displayname || username,
      license_key:   license,
      created_at:    today(),
      expires_at:    expires,
      enabled,
      last_login:    null,
      note
    };
    DB.users.push(newUser);
    toast(`用户 ${username} 已创建，记得保存到 GitHub`, 'info');
  }

  markUnsaved();
  closeModal();
  updateStats();
  renderTable();
}

// ── 禁用/启用 / 删除 ──────────────────────────────
function toggleUser(id) {
  const u = DB.users.find(x => x.id === id);
  if (!u) return;
  u.enabled = !u.enabled;
  markUnsaved();
  updateStats();
  renderTable();
  toast(`用户 ${u.username} 已${u.enabled ? '启用' : '禁用'}`, 'info');
}

function deleteUser(id) {
  const u = DB.users.find(x => x.id === id);
  if (!u) return;
  if (!confirm(`确定要删除用户 "${u.username}" 吗？此操作不可撤销。`)) return;
  DB.users = DB.users.filter(x => x.id !== id);
  markUnsaved();
  updateStats();
  renderTable();
  toast(`用户 ${u.username} 已删除`, 'ok');
}

// ── 标记未保存 ────────────────────────────────────
function markUnsaved() {
  unsaved = true;
  document.getElementById('save-banner').classList.add('show');
}

// ── 吐司通知 ──────────────────────────────────────
function toast(msg, type='info') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── 键盘快捷键 ────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (unsaved) saveToGitHub();
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const modal = document.getElementById('user-modal');
    if (modal.classList.contains('open')) saveUser();
  }
});

// ── 恢复会话 ──────────────────────────────────────
window.addEventListener('load', () => {
  const owner = sessionStorage.getItem('gh_owner');
  const repo  = sessionStorage.getItem('gh_repo');
  const token = sessionStorage.getItem('gh_token');
  if (owner && repo && token) {
    document.getElementById('gh-owner').value = owner;
    document.getElementById('gh-repo').value  = repo;
    document.getElementById('gh-token').value = token;
    doLogin();
  }
});
</script>
</body>
</html>
